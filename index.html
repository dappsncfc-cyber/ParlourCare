      )
    };

    const norfolkStaffList = [
      { id: "staff-1", name: "David (Cromer)", email: "david@cromerfunerals.co.uk" },
      { id: "staff-2", name: "Barrie (Cromer)", email: "sarah@cromerfunerals.co.uk" },
      { id: "staff-3", name: "Paul (Fakenham)", email: "paul@gowardsindependentfunerals.com" },
      { id: "staff-4", name: "Peter (Fakenham)", email: "luke@gowardsfunerals.co.uk" },
      { id: "staff-5", name: "Adrian (Group Operations)", email: "adrian@cromeranddistrictfunerals.co.uk" }
    ];

    const initialCaseload = [];

    const getTimestamp = () => {
      const now = new Date();
      const dd = String(now.getDate()).padStart(2, '0');
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const yyyy = now.getFullYear();
      const hh = String(now.getHours()).padStart(2, '0');
      const min = String(now.getMinutes()).padStart(2, '0');
      return `${dd}/${mm}/${yyyy} ${hh}:${min}`;
    };

    // --- BASE URL HELPER FOR QR & PRINTING ---
    const getBaseUrl = () => {
      try {
        const href = window.location.href;
        if (!href || href === 'about:blank' || href === 'about:srcdoc' || href.startsWith('file://')) {
          return "https://dappsncfc-cyber.github.io/ParlourCare/";
        }
        return href.split('?')[0];
      } catch (e) {
        return "https://dappsncfc-cyber.github.io/ParlourCare/";
      }
    };

    function App() {
      // Hydrate local cache immediately on startup so user never views a blank dashboard while Firestore is connecting
      const [deceasedList, setDeceasedList] = useState(() => {
        try {
          const local = localStorage.getItem('norfolk_mortuary_cases');
          return local ? JSON.parse(local) : initialCaseload;
        } catch(e) { return initialCaseload; }
      });
      const [selectedRowId, setSelectedRowId] = useState(null); 
      
      // Decoupled editing state to prevent real-time keystroke race conditions
      const [formState, setFormState] = useState(null);

      // Deep linking buffer
      const [pendingDeepLink, setPendingDeepLink] = useState(() => {
        try {
          return new URLSearchParams(window.location.search).get('case');
        } catch(e) { return null; }
      });

      const [activeTab, setActiveTab] = useState("care");
      const [activeBrand, setActiveBrand] = useState("joint");
      const [searchQuery, setSearchQuery] = useState("");
      const [locationFilter, setLocationFilter] = useState("All");
      const [statusFilter, setStatusFilter] = useState("Active"); 
      const [isQrModalOpen, setIsQrModalOpen] = useState(false);
      const [isEmailModalOpen, setIsEmailModalOpen] = useState(false);
      const [dialog, setDialog] = useState({ isOpen: false, title: "", message: "", type: "info", onConfirm: null });
      const [user, setUser] = useState(null);
      const seededRef = useRef(false);

      // --- NOTIFICATION STATE SYSTEM ---
      const [notifications, setNotifications] = useState([]);
      const [unreadCount, setUnreadCount] = useState(0);
      const [isNotificationTrayOpen, setIsNotificationTrayOpen] = useState(false);
      const prevListRef = useRef([]);
      const isFirstLoadRef = useRef(true);

      // --- FATAL ERROR PREVENTION UTILITIES ---
      const showNotification = (title, message, type = "info") => {
        setDialog({ isOpen: true, title, message, type, onConfirm: null });
      };

      const closeDialog = () => {
        setDialog({ isOpen: false, title: "", message: "", type: "info", onConfirm: null });
      };

      // RULE 3 - Custom auth init FIRST, fallback to anonymous auth
      useEffect(() => {
        if (!isFirebaseEnabled) return;

        const initAuth = async () => {
          try {
            if (initialAuthToken) {
              await signInWithCustomToken(auth, initialAuthToken);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Firebase auth failed, trying anonymous fallback:", err);
            try {
              await signInAnonymously(auth);
            } catch (anonErr) {
              console.error("Anonymous fallback failed:", anonErr);
            }
          }
        };

        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // Live Firestore synchronisation listener (RULE 1 & RULE 2 compliant)
      useEffect(() => {
        if (!isFirebaseEnabled) {
          try {
            const local = localStorage.getItem('norfolk_mortuary_cases');
            const parsedLocal = local ? JSON.parse(local) : initialCaseload;
            setDeceasedList(parsedLocal);
            prevListRef.current = parsedLocal;
          } catch(e) {}
          return;
        }

        if (!user) return;

        const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'cases');

        const unsubscribe = onSnapshot(
          colRef,
          (snapshot) => {
            if (snapshot.empty && !seededRef.current) {
              seededRef.current = true; // Lock immediately to prevent recursive loop runs
              let currentCases = initialCaseload;
              try {
                const localData = localStorage.getItem('norfolk_mortuary_cases');
                if (localData) currentCases = JSON.parse(localData);
              } catch(e) {}
              
              if (currentCases.length > 0) {
                currentCases.forEach((c) => {
                  const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'cases', c.id);
                  setDoc(docRef, c).catch(e => console.error("Cloud database seeding failed:", e));
                });
                setDeceasedList(currentCases);
                prevListRef.current = currentCases;
                try { localStorage.setItem('norfolk_mortuary_cases', JSON.stringify(currentCases)); } catch(e){}
              } else {
                setDeceasedList([]);
                prevListRef.current = [];
                try { localStorage.setItem('norfolk_mortuary_cases', JSON.stringify([])); } catch(e){}
              }
            } else {
              const cases = [];
              snapshot.forEach((doc) => {
                cases.push({ id: doc.id, ...doc.data() });
              });

              // Detect real-time updates for activity notifier bell
              if (isFirstLoadRef.current) {
                prevListRef.current = cases;
                isFirstLoadRef.current = false;
              } else {
                const newNotifications = [];
                const prevMap = new Map(prevListRef.current.map(c => [c.id, c]));
                const currentMap = new Map(cases.map(c => [c.id, c]));

                // User friendly field mapping
                const fieldsToCheck = ['deceasedName', 'title', 'fridgeTray', 'location', 'condition', 'coffin', 'pickupStatus', 'isArchived', 'keyMilestoneName', 'keyMilestoneUrgency'];
                const fieldLabels = {
                  deceasedName: 'Name', title: 'Title', fridgeTray: 'Tray No.', location: 'Branch',
                  condition: 'Condition', coffin: 'Coffin', pickupStatus: 'Dispatch Stage',
                  isArchived: 'Archive Status', keyMilestoneName: 'Milestone Action',
                  keyMilestoneUrgency: 'Milestone Urgency'
                };

                // Check additions and modifications
                cases.forEach(curr => {
                  const prev = prevMap.get(curr.id);
                  if (!prev) {
                    newNotifications.push({
                      id: String(Date.now()) + Math.random(),
                      type: 'addition',
                      title: 'Case Added',
                      message: `${curr.title} ${curr.deceasedName || 'Unnamed Case'} (${curr.ref}) was registered.`,
                      timestamp: getTimestamp()
                    });
                  } else {
                    const changedFields = [];
                    for (let f of fieldsToCheck) {
                      if (JSON.stringify(curr[f]) !== JSON.stringify(prev[f])) {
                        changedFields.push(fieldLabels[f] || f);
                      }
                    }
                    if (changedFields.length > 0) {
                      newNotifications.push({
                        id: String(Date.now()) + Math.random(),
                        type: 'update',
                        title: 'Case Updated',
                        message: `${curr.title} ${curr.deceasedName || 'Unnamed Case'} (${curr.ref}) had updates to: ${changedFields.join(', ')}.`,
                        timestamp: getTimestamp()
                      });
                    }
                  }
                });

                // Check deletions
                prevListRef.current.forEach(oldItem => {
                  if (!currentMap.has(oldItem.id)) {
                    newNotifications.push({
                      id: String(Date.now()) + Math.random(),
                      type: 'deletion',
                      title: 'Case Removed',
                      message: `${oldItem.title} ${oldItem.deceasedName || 'Unnamed Case'} (${oldItem.ref}) was deleted.`,
                      timestamp: getTimestamp()
                    });
                  }
                });

                if (newNotifications.length > 0) {
                  setNotifications(prev => [...newNotifications, ...prev].slice(0, 20));
                  setUnreadCount(prev => prev + newNotifications.length);
                }
                prevListRef.current = cases;
              }

              setDeceasedList(cases);
              try { localStorage.setItem('norfolk_mortuary_cases', JSON.stringify(cases)); } catch(e){}
            }
          },
          (error) => {
            console.error("Firestore synchronisation error:", error);
            showNotification("Sync Status", "Live cloud stream is temporarily offline. Working locally.", "info");
          }
        );

        return () => unsubscribe();
      }, [user]);

      // Synchronised write-helper updating local state immediately, then syncing to Firestore
      const saveCaseToDb = async (record) => {
        // Optimistic UI Update: Render changes immediately to prevent frozen spinners
        setDeceasedList(prev => {
          const index = prev.findIndex(item => item.id === record.id);
          let next;
          if (index > -1) {
            next = prev.map(item => item.id === record.id ? record : item);
          } else {
            next = [...prev, record];
          }

        const timestamp = getTimestamp();

        };
        const updatedRecord = {
          ...formState,
          pickupStatus: newStatus,
          pickupStatusTimestamps: updatedTimestamps
        };
        setFormState(updatedRecord);
        saveCaseToDb(updatedRecord);
      };

      const handleArchiveToggle = (id) => {
        const item = deceasedList.find(d => d.id === id);

        const updatedRecord = { ...item, isArchived: updatedArchiveState };
        saveCaseToDb(updatedRecord);
        if (selectedRowId === id && formState) {
          setFormState(prev => ({ ...prev, isArchived: updatedArchiveState }));

          if (activeBrand === "cromer") {

                  <button onClick={() => { printStickerAndCheckBlocks(formState); setIsQrModalOpen(false); }} className="flex-1 bg-amber-500 hover:bg-amber-400 text-slate-950 text-sm font-black py-3 rounded-xl transition-colors shadow-lg active:scale-95">Print Sticker</button>
                  <button onClick={() => setIsQrModalOpen(false)} className="bg-slate-800 hover:bg-slate-700 text-slate-200 text-sm font-bold px-6 py-3 rounded-xl transition-colors shadow-sm active:scale-95">Close</button>
                </div>
              </div>
            </div>
          )}

          {/* EMAIL PREVIEW LOGISTICS MODAL */}
          {isEmailModalOpen && formState && dispatchEmailData && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4 z-[9999] animate-fade-in">
              <div className="bg-slate-900 border border-slate-700/50 rounded-3xl max-w-xl w-full p-8 relative shadow-2xl transform transition-all animate-slide-up">
                <button onClick={() => setIsEmailModalOpen(false)} className="absolute top-4 right-4 text-slate-400 hover:text-white p-2 bg-slate-800/50 rounded-full transition-colors"><Icons.X size={18} /></button>
                <h3 className="text-xl font-black text-white mb-5 flex items-center gap-2"><Icons.Mail className="text-indigo-400"/> Email Preview</h3>
                <div className="space-y-3 bg-slate-950/50 p-5 rounded-2xl border border-slate-800 text-xs font-mono shadow-inner">
                  <div className="border-b border-slate-800 pb-3 text-slate-400"><span className="font-bold text-white mr-2 uppercase tracking-wider text-[10px]">To:</span> {formState?.pickupStaffEmails}</div>
                  <div className="border-b border-slate-800 pb-3 text-slate-400"><span className="font-bold text-white mr-2 uppercase tracking-wider text-[10px]">Subject:</span> {dispatchEmailData.subject}</div>
                  <div className="text-slate-300 whitespace-pre-wrap leading-relaxed max-h-72 overflow-y-auto pt-3 scrollbar-none font-medium">{dispatchEmailData.body}</div>
                </div>
                <div className="mt-6 flex gap-3 justify-end">
                  <button onClick={() => setIsEmailModalOpen(false)} className="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-bold px-6 py-3 rounded-xl transition-colors active:scale-95">Cancel</button>
                  <a href={dispatchEmailData.mailtoLink} onClick={() => setIsEmailModalOpen(false)} className="bg-amber-500 hover:bg-amber-400 text-slate-950 text-xs font-black px-6 py-3 rounded-xl transition-colors shadow-lg shadow-amber-500/20 active:scale-95 flex items-center gap-2"><Icons.Mail size={14}/> Launch Client</a>
                </div>
              </div>
            </div>
          )}

          {/* SYSTEM CONFIRMATION MODAL */}
          {dialog.isOpen && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md flex items-center justify-center p-4 z-[9999] animate-fade-in">
              <div className="bg-slate-900 border border-slate-700/50 rounded-3xl p-8 max-w-sm w-full shadow-2xl space-y-5 transform transition-all animate-slide-up">
                <div className="flex items-center space-x-3 text-amber-500 border-b border-slate-800/60 pb-4">
                  <div className="bg-amber-500/10 p-2 rounded-full">
                    <Icons.AlertTriangle className="flex-shrink-0 animate-pulse" size={28} />
                  </div>
                  <h4 className="text-lg font-black uppercase tracking-wider text-white">{dialog.title}</h4>
                </div>
                <p className="text-sm text-slate-300 leading-relaxed font-medium">{dialog.message}</p>
                <div className="flex items-center justify-end space-x-3 pt-3">
                  {dialog.type === "confirm" ? (
                    <>
                      <button onClick={closeDialog} className="bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-bold px-5 py-2.5 rounded-xl transition-colors active:scale-95">Cancel</button>
                      <button onClick={dialog.onConfirm} className="bg-red-600 hover:bg-red-500 text-white text-xs font-bold px-5 py-2.5 rounded-xl transition-colors shadow-lg shadow-red-600/20 active:scale-95">Confirm & Delete</button>
                    </>
                  ) : (
                    <button onClick={closeDialog} className="bg-amber-500 hover:bg-amber-400 text-slate-950 text-xs font-bold px-6 py-2.5 rounded-xl transition-colors shadow-lg active:scale-95">Ok</button>
                  )}
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    function BodyConditionIcon({ condition, size = 32 }) {
      if (condition === 'Good') {
        return (
          <svg width={size} height={size} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" className="text-emerald-400 transition-colors duration-300">
            <circle cx="50" cy="50" r="46" stroke="currentColor" strokeWidth="4" className="opacity-30" />
            <path d="M50 18C32.32 18 18 32.32 18 50C18 64.6 27.84 76.92 41.25 80.7C42.84 81.15 44 82.59 44 84.25V87C44 88.66 45.34 90 47 90H53C54.66 90 56 88.66 56 87V84.25C56 82.59 57.16 81.15 58.75 80.7C72.16 76.92 82 64.6 82 50C82 32.32 67.68 18 50 18Z" stroke="currentColor" strokeWidth="4" strokeLinecap="round" />
            <path d="M32 46C35 49 41 49 44 46" stroke="currentColor" strokeWidth="4" strokeLinecap="round" />
            <path d="M56 46C59 49 65 49 68 46" stroke="currentColor" strokeWidth="4" strokeLinecap="round" />
            <path d="M42 66C45 68 55 68 58 66" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
            <circle cx="28" cy="56" r="3" fill="currentColor" fillOpacity="0.4" />
            <circle cx="72" cy="56" r="3" fill="currentColor" fillOpacity="0.4" />
          </svg>
        );
      } else if (condition === 'Medium') {
        return (
          <svg width={size} height={size} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" className="text-amber-400 transition-colors duration-300">
            <circle cx="50" cy="50" r="46" stroke="currentColor" strokeWidth="4" className="opacity-30" />
            <path d="M50 18C34 18 20 32 20 48C20 60 26 70 34 75.5C36 76.8 38 78 38 80.5V85C38 86.6 39.4 88 41 88H59C60.6 88 62 86.6 62 85V80.5C62 78 64 76.8 66 75.5C74 70 80 60 80 48C80 32 66 18 50 18Z" stroke="currentColor" strokeWidth="4" strokeLinecap="round" />
            <path d="M28 44C28 41 38 41 38 44C38 47 28 47 28 44Z" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" fill="currentColor" fillOpacity="0.2" />
            <path d="M62 44C62 41 72 41 72 44C72 47 62 47 62 44Z" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" fill="currentColor" fillOpacity="0.2" />
            <line x1="30" y1="44" x2="36" y2="44" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
            <line x1="64" y1="44" x2="70" y2="44" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
            <line x1="44" y1="64" x2="56" y2="64" stroke="currentColor" strokeWidth="3" strokeLinecap="round" />
            <path d="M24 58C28 61 28 65 26 69" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
            <path d="M76 58C72 61 72 65 74 69" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
          </svg>
        );
      } else {
        return (
          <svg width={size} height={size} viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" className="text-rose-500 transition-colors duration-300">
            <circle cx="50" cy="50" r="46" stroke="currentColor" strokeWidth="4" className="opacity-30" />
            <path d="M50 14C28 14 22 28 22 48C22 55.5 25.5 60.5 29 63.5C31.5 66.5 33 67 33 71V79C33 83.5 36.5 86 41 86H59C63.5 86 67 83.5 67 79V71C67 67 68.5 66.5 71 63.5C74.5 60.5 78 55.5 78 48C78 28 72 14 50 14Z" stroke="currentColor" strokeWidth="4" strokeLinejoin="round" />
            <circle cx="36" cy="45" r="10" stroke="currentColor" strokeWidth="4" fill="currentColor" fillOpacity="0.2" />
            <circle cx="64" cy="45" r="10" stroke="currentColor" strokeWidth="4" fill="currentColor" fillOpacity="0.2" />
            <path d="M50 52L46 60H54L50 52Z" stroke="currentColor" strokeWidth="3.5" fill="currentColor" />
            <path d="M37 75H63" stroke="currentColor" strokeWidth="4" strokeLinecap="round" />
            <line x1="43" y1="71" x2="43" y2="79" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" />
            <line x1="50" y1="71" x2="50" y2="79" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" />
            <line x1="57" y1="71" x2="57" y2="79" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" />
            <path d="M26 30C24 35 24 38 26 41" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
            <path d="M74 30C76 35 76 38 74 41" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
          </svg>
        );
      }
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>

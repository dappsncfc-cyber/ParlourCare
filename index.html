  <script>
    // PWA ON-THE-FLY INJECTION
    const manifest = {
      name: "ParlourCare Portal",
      short_name: "ParlourCare",
      start_url: ".",
      display: "standalone",
      background_color: "#0f172a",
      theme_color: "#4f46e5",
      icons: [{
        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234f46e5'%3E%3Cpath d='M12 2L2 22h20L12 2z'/%3E%3C/svg%3E",
        sizes: "192x192",
        type: "image/svg+xml"
      }]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const manifestUrl = URL.createObjectURL(manifestBlob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = manifestUrl;
    document.head.appendChild(link);

    // DYNAMIC SERVICE WORKER INJECTION FOR PUSH NOTIFICATIONS
    const swCode = `
      self.addEventListener('push', function(event) {
        const data = event.data ? event.data.json() : { title: 'ParlourCare Update', body: 'A case file was updated.' };
        event.waitUntil(
          self.registration.showNotification(data.title, {
            body: data.body,
            icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234f46e5'%3E%3Cpath d='M12 2L2 22h20L12 2z'/%3E%3C/svg%3E"
          })
        );
      });
      self.addEventListener('notificationclick', function(event) {
        event.notification.close();
        event.waitUntil(clients.matchAll({ type: 'window' }).then(clientsArr => {
          if (clientsArr.length) return clientsArr[0].focus();
          return clients.openWindow('/');
        }));
      });
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(swBlob);
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register(swUrl).catch(err => console.log('SW Reg Failed', err));
      });
    }
  </script>

      executeIframePrint(htmlContent, isSticker = false) {

            <!DOCTYPE html>

                  body { margin: 0; padding: 0; background-color: ${isSticker ? '#ffffff' : '#f1f5f9'}; color: #000000; font-family: 'Segoe UI', Arial, sans-serif; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

        let signatureHtml = '';

    function SignaturePad({ value, onChange, disabled }) {
      const canvasRef = React.useRef(null);
      const [isDrawing, setIsDrawing] = React.useState(false);

      React.useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (value) {
          const img = new Image();
          img.onload = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          };
          img.src = value;
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }, [value]);

      const getCoordinates = (e, canvas) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
      };

      const startDrawing = (e) => {
        if (disabled) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const { x, y } = getCoordinates(e, canvas);
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#0f172a';
        ctx.beginPath();
        ctx.moveTo(x, y);
        setIsDrawing(true);
      };

      const draw = (e) => {
        if (!isDrawing || disabled) return;
        if (e.touches && e.cancelable) e.preventDefault(); 
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const { x, y } = getCoordinates(e, canvas);
        ctx.lineTo(x, y);
        ctx.stroke();
      };

      const stopDrawing = () => {
        if (!isDrawing || disabled) return;
        setIsDrawing(false);
        onChange(canvasRef.current.toDataURL('image/png'));
      };

      return (
        <div className="flex flex-col gap-1.5 w-full">
          <div 
            className={`border-2 rounded-xl overflow-hidden bg-white h-40 md:h-48 shadow-inner relative ${disabled ? 'opacity-50 cursor-not-allowed border-slate-700' : 'border-slate-300'}`}
            style={{ touchAction: 'none' }}
          >
            {!value && !disabled && <div className="absolute bottom-[25%] left-8 right-8 border-b-2 border-slate-200 border-dashed pointer-events-none"></div>}
            <canvas
              ref={canvasRef} width={800} height={400}
              className="w-full h-full cursor-crosshair touch-none relative z-10"
              onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing}
              onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing}
            />
          </div>
          {!disabled && (
            <button type="button" onClick={() => onChange('')} className="text-[10px] text-slate-500 hover:text-rose-400 font-bold self-end transition-colors uppercase tracking-wider mt-1">
              Clear Signature
            </button>
          )}
        </div>
      );
    }

                        <div className="mt-5 w-full grid grid-cols-2 gap-2">
                          <button type="button" onClick={(e) => { e.preventDefault(); setIsQrModalOpen(true); }} className="bg-slate-900 hover:bg-slate-855 text-slate-300 text-[10px] font-bold py-2 rounded-xl border border-slate-800 transition flex items-center justify-center gap-1.5"><Icons.Maximize2 size={12} /><span>Maximize</span></button>
                          <button type="button" onClick={(e) => { e.preventDefault(); PrintEngine.printStickerAndCheckBlocks(formState); }} className="bg-gradient-to-r from-amber-500 to-amber-600 text-slate-955 text-[10px] font-black py-2 rounded-xl transition flex items-center justify-center gap-1.5"><Icons.Printer size={12} /><span>Sticker</span></button>
                        </div>
                      </div>

                      {activeTab === "care" && (
                        <div className="bg-slate-950 p-5 rounded-2xl border border-slate-800 flex flex-col items-center text-center shadow-xl relative">
                          <span className="absolute top-3 left-4 text-[9px] font-black uppercase tracking-widest text-slate-500">Condition Metric</span>
                          <div className="my-6 p-4 bg-slate-900 rounded-full border border-slate-800/80 shadow-inner"><BodyConditionIcon condition={formState?.condition} size={64} /></div>
                          <h4 className="text-sm font-black text-white uppercase">Status: {formState?.condition}</h4>
                        </div>
                      )}

                      {!isCatherine && !isDavid && (
                        <div className="bg-slate-950 p-5 rounded-2xl border border-slate-800 shadow-xl relative">
                          <div className="absolute top-3 left-4 flex items-center space-x-1.5 text-slate-455"><Icons.FolderOpen size={13} className="text-indigo-400" /><span className="text-[9px] font-bold tracking-widest uppercase text-slate-400">File Administration</span></div>
                          <div className="mt-8 space-y-2.5 w-full">
                            {formState?.isCoroner && !formState?.isConverted && (
                              <button type="button" onClick={() => setDialog({ isOpen: true, title: "Convert to Standard Admission", message: `Convert the Coroner profile for ${formState.deceasedName} to a standard admission? This will lock the Coroner logs and unlock the Care and Workshop tabs.`, type: "confirm", onConfirm: () => { convertToAdmission(); closeDialog(); } })} className="w-full bg-indigo-950/40 hover:bg-indigo-900/60 text-indigo-300 border border-indigo-900/50 text-xs font-semibold py-2.5 px-3 rounded-xl transition-all flex items-center justify-between"><span className="flex items-center gap-2"><Icons.Layers size={14} className="text-indigo-400" />Convert to Admission</span></button>
                            )}
                            <button type="button" onClick={() => handleArchiveToggle(formState.id)} className="w-full bg-slate-900 hover:bg-slate-800 text-slate-205 border border-slate-800 text-xs font-semibold py-2.5 px-3 rounded-xl transition-all flex items-center justify-between"><span className="flex items-center gap-2"><Icons.FolderOpen size={14} className="text-amber-400" />{formState?.isArchived ? "Restore Case" : "Archive Custody Profile"}</span></button>
                            <button type="button" onClick={() => setDialog({ isOpen: true, title: "Confirm Case Removal", message: `Delete the record for ${formState.deceasedName}?`, type: "confirm", onConfirm: () => { deleteCaseFromDb(formState.id); setSelectedRowId(null); setFormState(null); closeDialog(); } })} className="w-full bg-red-955/20 hover:bg-red-950/40 text-red-200 border border-red-900/40 text-xs font-semibold py-2.5 px-3 rounded-xl transition-all flex items-center justify-between"><span className="flex items-center gap-2"><Icons.Trash2 size={14} className="text-red-400" />Delete Case Record</span></button>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>

          {/* GLOBAL MODALS */}
          {isQrModalOpen && formState && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-[9999] select-none animate-fade-in">
              <div className="bg-slate-955 border border-slate-800 rounded-3xl max-w-sm w-full p-6 text-center relative shadow-2xl">
                <button onClick={() => setIsQrModalOpen(false)} className="absolute top-3 right-3 text-slate-400 hover:text-white p-1.5"><Icons.X size={18} /></button>
                <h3 className="text-base font-black text-white mt-2">{formState?.title} {formState?.deceasedName || "Unnamed"}</h3>
                <p className="text-[10px] text-slate-550 font-mono mt-0.5">Ref: {formState?.ref}</p>
                <div className="bg-white p-4 rounded-2xl shadow-2xl inline-block my-4"><img src={`https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(`${getBaseUrl()}?case=${formState.id}`)}&bgcolor=ffffff&color=000000`} className="w-48 h-48 object-contain" /></div>
                <div className="mt-5 flex gap-2">
                  <button onClick={() => { PrintEngine.printStickerAndCheckBlocks(formState); setIsQrModalOpen(false); }} className="flex-1 bg-amber-500 hover:bg-amber-400 text-slate-955 text-xs font-black py-2.5 rounded-xl transition-colors">Print Sticker</button>
                  <button onClick={() => setIsQrModalOpen(false)} className="bg-slate-800 hover:bg-slate-705 text-slate-300 text-xs font-bold px-5 py-2.5 rounded-xl transition-colors">Close</button>
                </div>
              </div>
            </div>
          )}

          {isEmailModalOpen && formState && dispatchEmailData && (
            <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-[9999] animate-fade-in">
              <div className="bg-slate-950 border border-slate-800 rounded-2xl max-w-xl w-full p-6 relative shadow-2xl">
                <button onClick={() => setIsEmailModalOpen(false)} className="absolute top-3 right-3 text-slate-400 hover:text-white p-1.5"><Icons.X size={18} /></button>
                <h3 className="text-base font-black text-white mb-4 select-none">Email Preview</h3>
                <div className="space-y-2 bg-slate-900 p-4 rounded-2xl border border-slate-800 text-xs font-mono">
                  <div className="border-b border-slate-800 pb-2 text-slate-400"><span className="font-bold text-white">To:</span> {formState?.pickupStaffEmails}</div>
                  <div className="border-b border-slate-800 pb-2 text-slate-400"><span className="font-bold text-white">Subject:</span> {dispatchEmailData.subject}</div>
                  <div className="text-slate-300 whitespace-pre-wrap leading-relaxed max-h-64 overflow-y-auto pt-2">{dispatchEmailData.body}</div>
                </div>
                <div className="mt-5 flex gap-2 justify-end select-none">
                  <button onClick={() => setIsEmailModalOpen(false)} className="bg-slate-800 text-slate-300 text-xs font-bold px-4 py-2 rounded-xl transition-colors">Cancel</button>
                  <a href={dispatchEmailData.mailtoLink} onClick={() => setIsEmailModalOpen(false)} className="bg-amber-500 hover:bg-amber-400 text-slate-955 text-xs font-black px-5 py-2 rounded-xl flex items-center justify-center">Launch Client</a>
                </div>
              </div>
            </div>
          )}

          {dialog.isOpen && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-[9999] select-none animate-fade-in">
              <div className="bg-slate-955 border border-slate-800 rounded-2xl p-6 max-w-sm w-full shadow-2xl space-y-4">
                <div className="flex items-center space-x-3 text-amber-500"><Icons.AlertTriangle className="flex-shrink-0" size={24} /><h4 className="text-base font-black uppercase tracking-wider text-white">{dialog.title}</h4></div>
                <p className="text-xs text-slate-300 leading-relaxed">{dialog.message}</p>
                <div className="flex items-center justify-end space-x-2 pt-2">
                  {dialog.type === "confirm" ? (
                    <><button onClick={closeDialog} className="bg-slate-800 hover:bg-slate-755 text-slate-300 text-xs font-bold px-4 py-2 rounded-xl transition-colors">Cancel</button><button onClick={dialog.onConfirm} className="bg-red-600 hover:bg-red-500 text-white text-xs font-bold px-4 py-2 rounded-xl transition-colors">Confirm</button></>
                  ) : (
                    <button onClick={closeDialog} className="bg-amber-500 hover:bg-amber-400 text-slate-955 text-xs font-bold px-5 py-2 rounded-xl transition-colors shadow-lg">Ok</button>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>

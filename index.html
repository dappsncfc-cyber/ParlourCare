      const now = new Date();
      const dd = String(now.getDate()).padStart(2, '0');
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const yyyy = now.getFullYear();
      const hh = String(now.getHours()).padStart(2, '0');
      const min = String(now.getMinutes()).padStart(2, '0');
      return `${dd}/${mm}/${yyyy} ${hh}:${min}`;

    function App() {

      const handleLogin = (e) => {

        if (u === 'catherine' && password === "iloveadrian") valid = true;

          try { localStorage.setItem('parlourcare_user', u); } catch(e) {}

        setLoggedInUser(null);
        try { localStorage.removeItem('parlourcare_user'); } catch(e) {}

      // -------------------------

        try {

      const [selectedRowId, setSelectedRowId] = useState(null); 
      const [formState, setFormState] = useState(null);
      
      const [viewMode, setViewMode] = useState("cases"); 
      const [stockSearchQuery, setStockSearchQuery] = useState("");
      
      // Stock room levels with defensive local caching migration logic
      const [stockLevels, setStockLevels] = useState(() => {
        try {
          const localStock = localStorage.getItem('norfolk_mortuary_stock');
          if (localStock) {
            const parsed = JSON.parse(localStock);
            // Migrate fields to inject Wreath Holders & Crucifix categories safely if missing
            if (!parsed.wreathHolders) parsed.wreathHolders = initialInventory.wreathHolders;
            if (!parsed.crucifixes) parsed.crucifixes = initialInventory.crucifixes;
            // Clean up old 'None' entries from the inventory states
            if (parsed.coffins && parsed.coffins["None"] !== undefined) delete parsed.coffins["None"];
            if (parsed.handles && parsed.handles["None"] !== undefined) delete parsed.handles["None"];
            return parsed;
          }
          return initialInventory;
        } catch(e) { return initialInventory; }
      });

      const [pendingDeepLink, setPendingDeepLink] = useState(() => {
        try {
          return new URLSearchParams(window.location.search).get('case');
        } catch(e) { return null; }
      });

      const [statusFilter, setStatusFilter] = useState("Active");

      const [isQrModalOpen, setIsQrModalOpen] = useState(false);
      const [isEmailModalOpen, setIsEmailModalOpen] = useState(false);

      const [user, setUser] = useState(null);
      const seededRef = useRef(false);

      const [notifications, setNotifications] = useState([]);

      const isFirstLoadRef = useRef(true);

      const isLogisticsLocked = useMemo(() => {
        return formState?.isCoroner && formState?.transferStatus === 'Completed' && formState?.transferType === 'Pick up';
      }, [formState]);

      const showNotification = (title, message, type = "info") => {
        setDialog({ isOpen: true, title, message, type, onConfirm: null });
      };

      const closeDialog = () => {
        setDialog({ isOpen: false, title: "", message: "", type: "info", onConfirm: null });
      };

      const saveStockToDb = async (newStock) => {
        try {
          localStorage.setItem('norfolk_mortuary_stock', JSON.stringify(newStock));
        } catch(e){}

        if (isFirebaseEnabled && auth.currentUser) {
          try {
            const safeAppId = String(appId);
            const stockDocRef = doc(db, 'artifacts', safeAppId, 'public', 'data', 'stock', 'inventory');
            await setDoc(stockDocRef, JSON.parse(JSON.stringify(newStock)));
          } catch(err) {
            console.error("Live stock save rejected:", err);
          }
        }
      };

      useEffect(() => {
        if (!isFirebaseEnabled) return;

        const initAuth = async () => {
          try {
            if (initialAuthToken) {
              await signInWithCustomToken(auth, initialAuthToken);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Firebase auth failed, trying anonymous fallback:", err);
            try {
              await signInAnonymously(auth);
            } catch (anonErr) {
              console.error("Anonymous fallback failed:", anonErr);
            }
          }
        };

        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => {
          if (unsubscribe) unsubscribe();
        };
      }, []);

      useEffect(() => {
        if (!isFirebaseEnabled) {
          try {
            const local = localStorage.getItem('norfolk_mortuary_cases');
            const parsedLocal = local ? JSON.parse(local) : initialCaseload;
            setDeceasedList(parsedLocal);
            prevListRef.current = parsedLocal;
          } catch(e) {}
          return;
        }

        if (!user) return;

        const safeAppId = String(appId);
        const colRef = collection(db, 'artifacts', safeAppId, 'public', 'data', 'cases');
        const stockDocRef = doc(db, 'artifacts', safeAppId, 'public', 'data', 'stock', 'inventory');

        getDoc(stockDocRef).then((snap) => {
          if (snap.exists()) {
            const remoteStock = snap.data();
            // Securely ensure category migrations are completed in remote snapshots too
            if (!remoteStock.wreathHolders) remoteStock.wreathHolders = initialInventory.wreathHolders;
            if (!remoteStock.crucifixes) remoteStock.crucifixes = initialInventory.crucifixes;
            if (remoteStock.coffins && remoteStock.coffins["None"] !== undefined) delete remoteStock.coffins["None"];
            if (remoteStock.handles && remoteStock.handles["None"] !== undefined) delete remoteStock.handles["None"];
            
            setStockLevels(remoteStock);
            try { localStorage.setItem('norfolk_mortuary_stock', JSON.stringify(remoteStock)); } catch(e){}
          } else {
            setDoc(stockDocRef, initialInventory).catch(e => console.error("Database inventory seeding failed:", e));
          }
        });

        const unsubscribe = onSnapshot(
          colRef,
          (snapshot) => {
            if (snapshot.empty && !seededRef.current) {
              seededRef.current = true;
              let currentCases = initialCaseload;
              try {
                const localData = localStorage.getItem('norfolk_mortuary_cases');
                if (localData) currentCases = JSON.parse(localData);
              } catch(e) {}
              
              if (currentCases.length > 0) {
                currentCases.forEach((c) => {
                  const safeRecordId = String(c.id);
                  const docRef = doc(db, 'artifacts', safeAppId, 'public', 'data', 'cases', safeRecordId);
                  setDoc(docRef, JSON.parse(JSON.stringify(c)));
                });
                setDeceasedList(currentCases);
                prevListRef.current = currentCases;
                try { localStorage.setItem('norfolk_mortuary_cases', JSON.stringify(currentCases)); } catch(e){}
              } else {
                setDeceasedList([]);
                prevListRef.current = [];
              }
            } else {
              const cases = [];
              snapshot.forEach((doc) => {
                cases.push({ id: doc.id, ...doc.data() });
              });

              if (isFirstLoadRef.current) {
                prevListRef.current = cases;
                isFirstLoadRef.current = false;
              } else {
                const newNotifications = [];
                const prevMap = new Map((prevListRef.current || []).map(c => [c.id, c]));
                const currentMap = new Map(cases.map(c => [c.id, c]));

                const fieldsToCheck = ['deceasedName', 'title', 'fridgeTray', 'location', 'condition', 'coffin', 'coffinHandles', 'wreathHolders', 'crucifix', 'pickupStatus', 'transferStatus', 'isArchived', 'keyMilestoneName', 'keyMilestoneUrgency', 'transferDateTime', 'transferHospital', 'transferType', 'transferVehicle', 'transferStaff'];
                const fieldLabels = {
                  deceasedName: 'Name', title: 'Title', fridgeTray: 'Tray No.', location: 'Branch',
                  condition: 'Condition', coffin: 'Coffin', coffinHandles: 'Handles Type', wreathHolders: 'Wreath Holders', crucifix: 'Crucifix', pickupStatus: 'Dispatch Stage', transferStatus: 'Transfer Stage',
                  isArchived: 'Archive Status', keyMilestoneName: 'Milestone Action', keyMilestoneUrgency: 'Milestone Urgency'
                };

                cases.forEach(curr => {
                  const prev = prevMap.get(curr.id);
                  if (!prev) {
                    newNotifications.push({
                      id: String(Date.now()) + Math.random(),
                      type: 'addition',
                      title: 'Case Added',
                      message: `${curr.title} ${curr.deceasedName || 'Unnamed Case'} (${curr.ref}) was registered.`,
                      timestamp: getTimestamp()
                    });
                  } else {
                    const changedFields = [];
                    for (let f of fieldsToCheck) {
                      if (JSON.stringify(curr[f]) !== JSON.stringify(prev[f])) {
                        changedFields.push(fieldLabels[f] || f);
                      }
                    }
                    if (changedFields.length > 0) {
                      newNotifications.push({
                        id: String(Date.now()) + Math.random(),
                        type: 'update',
                        title: 'Case Updated',
                        message: `${curr.title} ${curr.deceasedName || 'Unnamed Case'} (${curr.ref}) had updates to: ${changedFields.join(', ')}.`,
                        timestamp: getTimestamp()
                      });
                    }
                  }
                });

                (prevListRef.current || []).forEach(oldItem => {
                  if (!currentMap.has(oldItem.id)) {
                    newNotifications.push({
                      id: String(Date.now()) + Math.random(),
                      type: 'deletion',
                      title: 'Case Removed',
                      message: `${oldItem.title} ${oldItem.deceasedName || 'Unnamed Case'} (${oldItem.ref}) was deleted.`,
                      timestamp: getTimestamp()
                    });
                  }
                });

                if (newNotifications.length > 0) {
                  setNotifications(prev => [...newNotifications, ...prev].slice(0, 20));
                  setUnreadCount(prev => prev + newNotifications.length);
                }
                prevListRef.current = cases;
              }

              setDeceasedList(cases);
              try { localStorage.setItem('norfolk_mortuary_cases', JSON.stringify(cases)); } catch(e){}
            }
          },
          (error) => {
            console.error("Firestore synchronisation error:", error);

        );

      const filteredList = useMemo(() => {
        const urgencyOrder = { 'High': 3, 'Medium': 2, 'Low': 1, 'None': 0, undefined: 0 };
        const result = deceasedList.filter(item => {
          const matchSearch = (item.deceasedName || "").toLowerCase().includes(searchQuery.toLowerCase()) ||

          let matchLoc = true;
          if (activeBrand === "cromer") {
            matchLoc = item.location === "Cromer";
          } else if (activeBrand === "gowards") {
            matchLoc = item.location === "Fakenham";
          } else {
            matchLoc = locationFilter === "All" || item.location === locationFilter;
          }

          const matchStatus = statusFilter === "Active" ? !item.isArchived : item.isArchived;
          
          let matchHud = true;
          if (hudFilter === "Coroner") matchHud = item.isCoroner && !(item.transferStatus === 'Completed' && item.transferType === 'Pick up');
          if (hudFilter === "Transfers") matchHud = item.isCoroner && !!item.transferDateTime && item.transferStatus !== 'Completed';
